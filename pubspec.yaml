name: flutter_clean_architecture_template
description: "A new Flutter project."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev


version: 1.0.0+1

environment:
  sdk: ">=3.11.5 <4.0.0"

dependencies:
  cached_network_image: ^3.4.1
  cupertino_icons: ^1.0.8
  dartz: ^0.10.1
  dio: ^5.9.2
  easy_localization: ^3.0.8
  envied: ^1.3.4
  equatable: ^2.0.8
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_flavor: ^3.1.4
  flutter_native_splash: ^2.4.7
  flutter_screenutil: ^5.9.3
  flutter_secure_storage: ^10.0.0
  get_it: ^9.2.1
  go_router: ^17.1.0
  internet_connection_checker_plus: ^2.7.2
  intl: ^0.20.2
  logger: ^2.7.0
  shared_preferences: ^2.5.4
  shimmer: ^3.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  build_runner: ^2.4.13
  hive_generator: ^2.0.0
  envied_generator: 1.1.1
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter_gen:
  output: lib/generated/
  integrations:
    flutter_svg: true



flutter:

  uses-material-design: true

  assets:
    - assets/translations/

  fonts:
    - family: TheYearofHandicrafts
      fonts:
        - asset: assets/fonts/TheYearofHandicrafts-Regular.otf
        - asset: assets/fonts/TheYearofHandicrafts-Bold.otf